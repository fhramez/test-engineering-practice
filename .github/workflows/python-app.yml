name: Temperature Test CI

on:
  push:
    branches: [ "main" ]

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run temperature test
        run: python temperature_test.py
